# GIOP nginx front for Martin — HTTP tile cache (does not change zoom settings).
# Upstream is the host-published Martin port (default giop-martin → :3001).
#
# Started by scripts/ensure_martin_cache.sh on host port MARTIN_CACHE_PORT (default 3002).
# Point the portal at the cache with:
#   VITE_MARTIN_URL=http://127.0.0.1:3002
# Leave VITE_MARTIN_URL=http://127.0.0.1:3001 to talk to Martin directly.
#
# Martin returns plain-text 404 bodies for out-of-range zooms ("Zoom N is not valid…").
# MapLibre's PBF parser then throws "Unimplemented type: 4". Convert those to empty
# 204 tiles and never advertise browser caching on error responses.

proxy_cache_path /var/cache/nginx/martin
                 levels=1:2
                 max_size=2g
                 inactive=2h
                 use_temp_path=off
                 keys_zone=martin_tiles:32m;

upstream giop_martin {
  # host.docker.internal → host MARTIN_PORT (giop-martin -p 3001:3000)
  server host.docker.internal:3001;
  keepalive 32;
}

map $upstream_status $martin_cache_control {
  default "no-store";
  ~^20[04]$ "public, max-age=3600";
}

server {
  listen 3001;
  server_name _;

  # Catalog / health — short cache so layer list stays fresh after promote.
  location = /catalog {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_cache martin_tiles;
    proxy_cache_valid 200 30s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header X-Cache-Status $upstream_cache_status always;
    add_header Cache-Control "public, max-age=30" always;
    proxy_pass http://giop_martin;
  }

  # Vector tiles — longer TTL; promote busts via portal ?v= on sources.
  location / {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Ask Martin for gzip once; keep Content-Encoding on cache HIT.
    proxy_set_header Accept-Encoding gzip;

    proxy_cache martin_tiles;
    proxy_cache_key "$scheme$proxy_host$request_uri";
    proxy_cache_lock on;
    proxy_cache_revalidate on;
    proxy_cache_valid 200 1h;
    proxy_cache_valid 204 1h;
    # Never store Martin error bodies (plain-text 404s).
    proxy_cache_valid 404 0;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    # Turn text 404s into empty tiles so MapLibre never PBF-parses "Zoom N is not valid".
    proxy_intercept_errors on;
    error_page 404 = @empty_tile;

    add_header X-Cache-Status $upstream_cache_status always;
    add_header Cache-Control $martin_cache_control always;

    proxy_pass http://giop_martin;
  }

  location @empty_tile {
    internal;
    default_type application/x-protobuf;
    add_header Cache-Control "no-store" always;
    add_header X-Cache-Status "BYPASS-404" always;
    return 204;
  }
}
