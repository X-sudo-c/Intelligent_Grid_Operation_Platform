# GIOP Martin — publish only map layers (avoids 924k raw connectivity_nodes scan).
# Tile layers are MATERIALIZED VIEWs (migration 00100) for fast MVT generation.
listen_addresses: '0.0.0.0:3000'

# In-process tile cache — repeats of the same z/x/y skip PostGIS.
cache:
  size_mb: 1024
  tile_size_mb: 768
  # Hot Accra/Kumasi pans stay warm; promote uses ?v= cache-bust on sources.
  tile_idle_timeout: 1h
  maxzoom: 16
  minzoom: 6

preferred_encoding: gzip

postgres:
  connection_string: ${DATABASE_URL}
  default_srid: 4326
  auto_bounds: skip
  # More concurrent tile SQL under pan/zoom (was 10).
  pool_size: 20
  auto_publish: false
  tables:
    map_connectivity_nodes:
      schema: public
      table: map_connectivity_nodes
      srid: 4326
      geometry_column: geom
      geometry_type: POINT
      bounds: [-3.5, 4.5, 1.5, 8.5]
      # Align with portal DETAIL_NODE_MIN_ZOOM (11.5).
      minzoom: 11
      maxzoom: 16
      properties:
        mrid: text
        boundary_feeder_id: text
        name: text
        validation: text
    map_power_transformers:
      schema: public
      table: map_power_transformers
      srid: 4326
      geometry_column: geom
      geometry_type: POINT
      bounds: [-3.5, 4.5, 1.5, 8.5]
      minzoom: 12
      maxzoom: 16
      properties:
        mrid: text
        connectivity_node_mrid: text
        transformer_kind: text
        rated_power_kva: float4
        boundary_feeder_id: text
        name: text
        validation: text
    map_ac_line_segments:
      schema: public
      table: map_ac_line_segments
      srid: 4326
      geometry_column: geom
      geometry_type: LINESTRING
      bounds: [-3.5, 4.5, 1.5, 8.5]
      minzoom: 11
      maxzoom: 16
      properties:
        mrid: text
        nominal_voltage: text
        phases: text
        name: text
        validation: text
        installation_type: text
        length_m: float4
    map_unpromoted_conductor_segments:
      schema: public
      table: map_unpromoted_conductor_segments
      srid: 4326
      geometry_column: geom
      geometry_type: LINESTRING
      bounds: [-3.5, 4.5, 1.5, 8.5]
      minzoom: 11
      maxzoom: 16
      properties:
        id: int8
        source_layer: text
        nominal_voltage: text
        district: text
        installation_type: text
        length_m: float4
    ug_cable_33kv:
      schema: gis
      table: ug_cable_33kv
      srid: 4326
      geometry_column: geom
    ug_cable_11kv:
      schema: gis
      table: ug_cable_11kv
      srid: 4326
      geometry_column: geom
    oh_conductor_33kv:
      schema: gis
      table: oh_conductor_33kv
      srid: 4326
      geometry_column: geom
    oh_conductor_11kv:
      schema: gis
      table: oh_conductor_11kv
      srid: 4326
      geometry_column: geom
    power_transformer:
      schema: gis
      table: power_transformer
      srid: 4326
      geometry_column: geom
    distribution_transformer:
      schema: gis
      table: distribution_transformer
      srid: 4326
      geometry_column: geom
    ecg_admin_boundaries:
      schema: gis
      table: ecg_admin_boundaries
      srid: 4326
      geometry_column: geom
      geometry_type: MULTIPOLYGON
      bounds: [-3.5, 4.5, 1.5, 8.5]
      properties:
        fid: int4
        district: text
        region: text
    ecg_admin_regions:
      schema: gis
      table: ecg_admin_regions
      srid: 4326
      geometry_column: geom
      geometry_type: MULTIPOLYGON
      bounds: [-3.5, 4.5, 1.5, 8.5]
      properties:
        fid: int4
        region: text
    h3_rebuild_coverage:
      schema: public
      table: h3_rebuild_coverage
      srid: 4326
      geometry_column: geom
      geometry_type: POLYGON
      bounds: [-3.5, 4.5, 1.5, 8.5]
      minzoom: 0
      maxzoom: 16
      properties:
        h3_index: text
        resolution: int2
        verified_count: int4
        staged_count: int4
        reference_count: int4
