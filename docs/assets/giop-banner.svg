<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="GIOP  Grid Intelligent Operating Platform">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="gridGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#38bdf8" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#sky)"/>
  <rect width="1200" height="320" fill="url(#dots)"/>

  <!-- faint grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.45">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200"/>
    <path d="M200 0 V320 M400 0 V320 M600 0 V320 M800 0 V320 M1000 0 V320"/>
  </g>

  <!-- animated feeder lines -->
  <g fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M60 250 C180 210, 260 280, 380 200 S560 120, 700 160 S900 240, 1140 110">
      <animate attributeName="stroke-dasharray" values="0 900;220 900;0 900" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-420;-840" dur="4.5s" repeatCount="indefinite"/>
    </path>
    <path d="M40 120 C160 160, 280 80, 420 140 S620 220, 780 170 S980 90, 1160 180" opacity="0.7" stroke-width="1.8">
      <animate attributeName="stroke-dasharray" values="0 900;160 900;0 900" dur="5.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-360;-720" dur="5.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- pulsing nodes -->
  <g filter="url(#softGlow)">
    <circle cx="380" cy="200" r="6" fill="#22d3ee">
      <animate attributeName="r" values="5;8;5" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="160" r="7" fill="#38bdf8">
      <animate attributeName="r" values="6;9;6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="210" r="5" fill="#7dd3fc">
      <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1140" cy="110" r="6" fill="#22d3ee"/>
  </g>

  <!-- scanning beam -->
  <rect x="0" y="0" width="120" height="320" fill="url(#gridGlow)" opacity="0.35">
    <animate attributeName="x" values="-140;1200" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- title -->
  <text x="64" y="118" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="54" font-weight="800" letter-spacing="1.5">GIOP</text>
  <text x="64" y="158" fill="#67e8f9" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">Grid Intelligent Operating Platform</text>
  <text x="64" y="198" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">National GIS stewardship · topology DQ · AI map copilot · field-to-master promote</text>

  <!-- chips -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">
    <rect x="64" y="230" rx="14" ry="14" width="92" height="28" fill="#0ea5e933" stroke="#22d3ee66"/>
    <text x="110" y="248" text-anchor="middle" fill="#a5f3fc">PostGIS</text>
    <rect x="168" y="230" rx="14" ry="14" width="86" height="28" fill="#0ea5e933" stroke="#22d3ee66"/>
    <text x="211" y="248" text-anchor="middle" fill="#a5f3fc">Martin</text>
    <rect x="266" y="230" rx="14" ry="14" width="108" height="28" fill="#0ea5e933" stroke="#22d3ee66"/>
    <text x="320" y="248" text-anchor="middle" fill="#a5f3fc">Memgraph</text>
    <rect x="386" y="230" rx="14" ry="14" width="78" height="28" fill="#0ea5e933" stroke="#22d3ee66"/>
    <text x="425" y="248" text-anchor="middle" fill="#a5f3fc">Voice AI</text>
  </g>
</svg>
